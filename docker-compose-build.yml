# GoClaw All-in-One — Local build mode (build from source + pgAdmin)
#
# Prerequisites:
#   Clone goclaw-core source to ../goclaw-core (sibling directory)
#
# Usage:
#   docker compose -f docker-compose-build.yml up -d --build
#
# Dashboard: http://localhost:3000
# API:       http://localhost:3000/v1/
# pgAdmin:   http://localhost:5050

services:
  goclaw:
    platform: linux/amd64
    build:
      context: ../goclaw-core
      dockerfile: ${PWD}/Dockerfile
      additional_contexts:
        deploy: .
      args:
        VERSION: ${GOCLAW_VERSION:-dev}
    ports:
      - "${GOCLAW_UI_PORT:-3000}:18790"
    volumes:
      - goclaw-data:/app/data
      - goclaw-workspace:/app/workspace
    env_file:
      - path: .env
        required: false
    environment:
      GOCLAW_CONFIG: /app/data/config.json
      GOCLAW_MODE: managed
      GOCLAW_SKILLS_DIR: /app/data/skills
      GOCLAW_POSTGRES_DSN: postgres://${POSTGRES_USER:-goclaw}:${POSTGRES_PASSWORD:-goclaw}@postgres:5432/${POSTGRES_DB:-goclaw}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    init: true
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
      - CHOWN
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=256m
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2.0'
          pids: 200
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg18
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-goclaw}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-goclaw}
      POSTGRES_DB: ${POSTGRES_DB:-goclaw}
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-goclaw} -d ${POSTGRES_DB:-goclaw}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  goclaw-data:
  goclaw-workspace:
  pgdata:
  pgadmin-data:
