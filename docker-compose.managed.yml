# Managed mode overlay — adds PostgreSQL + pgvector.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.managed.yml up -d

services:
  goclaw:
    environment:
      GOCLAW_MODE: managed
      GOCLAW_POSTGRES_DSN: postgres://goclaw:${POSTGRES_PASSWORD:-goclaw}@postgres:5432/goclaw?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: pgvector/pgvector:pg18
    environment:
      POSTGRES_USER: goclaw
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-goclaw}
      POSTGRES_DB: goclaw
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U goclaw"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
