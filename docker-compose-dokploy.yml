# GoClaw All-in-One — Dokploy mode (PostgreSQL + pgvector + Web Dashboard + pgAdmin)
#
# Usage:
#   docker compose -f docker-compose-dokploy.yml up -d
#
# Dashboard: Accessible via Dokploy proxy (configure in Dokploy dashboard)

services:
  goclaw:
    image: itsddvn/goclaw:v2.45.1
    volumes:
      - ${GOCLAW_DATA_VOLUME:-goclaw-data}:/app/data
      - ${GOCLAW_WORKSPACE_VOLUME:-goclaw-workspace}:/app/workspace
    env_file:
      - path: .env
        required: false
    environment:
      GOCLAW_CONFIG: /app/data/config.json
      GOCLAW_MODE: managed
      GOCLAW_SKILLS_DIR: /app/data/skills
      GOCLAW_POSTGRES_DSN: postgres://${POSTGRES_USER:-goclaw}:${POSTGRES_PASSWORD:-goclaw}@postgres:5432/${POSTGRES_DB:-goclaw}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dokploy-network
    security_opt:
      - no-new-privileges:true
    init: true
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
      - CHOWN
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=256m
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2.0'
          pids: 200
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg18
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-goclaw}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-goclaw}
      POSTGRES_DB: ${POSTGRES_DB:-goclaw}
    volumes:
      - pgdata:/var/lib/postgresql
    networks:
      - dokploy-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-goclaw} -d ${POSTGRES_DB:-goclaw}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    networks:
      - dokploy-network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

networks:
  dokploy-network:
    external: true

volumes:
  goclaw-data:
  goclaw-workspace:
  pgdata:
  pgadmin-data:
